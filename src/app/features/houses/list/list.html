<main class="max-w-7xl mx-auto px-6 md:px-12 py-12 md:py-20">

  <section class="flex flex-col items-center mb-16" aria-label="Search">
    <h1 class="font-newsreader text-display-lg text-on-surface text-center mb-8">The Great Houses</h1>

    <app-search
      [suggestions]="autocompleteSuggestions()"
      [allHousesLoaded]="housesStore.allHousesLoaded()"
      (focused)="onSearchFocus()"
      (searchChange)="onSearchChange($event)"
      (suggestionSelect)="onSuggestionSelect($event)"
    />
  </section>

  @if (loading() && houses().length === 0) {
    <div class="flex justify-center py-20" role="status" aria-label="Loading houses">
      <div class="w-12 h-12 border-4 border-primary-container border-t-primary rounded-full animate-spin"></div>
    </div>
  } @else if (error()) {
    <p class="text-error text-center py-12 font-inter text-body-md" role="alert">{{ error() }}</p>
  } @else if (!loading() && houses().length === 0) {
    <p class="text-center py-20 font-inter text-body-md text-on-surface-variant">No houses found.</p>
  } @else {
    <section
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter mb-20"
      [class.opacity-50]="loading()"
      [class.pointer-events-none]="loading()"
      aria-label="Houses of Westeros"
      [attr.aria-busy]="loading()"
    >
      @for (house of houses(); track house.url) {
        <app-house-card
          [house]="house"
          [isFavorite]="favoritesStore.favoriteIdSet().has(houseIdFromUrl(house.url))"
          [detailLink]="[houseIdFromUrl(house.url)]"
          (favoriteToggle)="favoritesStore.toggleFavorite(houseIdFromUrl(house.url))"
        />
      }
    </section>

    <app-pagination
      [currentPage]="pagination().currentPage"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />
  }

</main>
